name: Build Docker Image

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (from cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run SAST
        run: semgrep --config p/python --config p/flask --config p/owasp-top-ten --json --output semgrep_report.json || true

      - name: Upload SAST report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: semgrep_report.json

  semgrep-sca:
    name: Semgrep SCA (Supply Chain)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run SCA
        run: semgrep --config p/python --json --output sca_report.json || true

      - name: Upload SCA report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: sca_report.json

  upload-to-faraday:
    name: Upload to Faraday
    runs-on: ubuntu-latest
    needs: [semgrep-sast, semgrep-sca]
    container:
      image: python:3.9
      options: --user root
    steps:
      - name: Download SAST report artifact
        uses: actions/download-artifact@v4
        with:
          name: sast-report
          path: sast-report

      - name: Download SCA report artifact
        uses: actions/download-artifact@v4
        with:
          name: sca-report
          path: sca-report

      - name: Upload Reports to Faraday
        env:
          FARADAY_HOST: ${{ secrets.FARADAY_HOST }}
          FARADAY_USERNAME: ${{ secrets.FARADAY_USERNAME }}
          FARADAY_PASSWORD: ${{ secrets.FARADAY_PASSWORD }}
          FARADAY_WORKSPACE: ${{ secrets.FARADAY_WORKSPACE }}
        run: |
          pip install faraday-cli
          faraday-cli auth -f "$FARADAY_HOST" -u "$FARADAY_USERNAME" -p "$FARADAY_PASSWORD"
          faraday-cli workspace create "$FARADAY_WORKSPACE" || true
          faraday-cli workspace select "$FARADAY_WORKSPACE"
          faraday-cli tool report sast-report/semgrep_report.json
          faraday-cli tool report sca-report/sca_report.json

  dast:
    runs-on: ubuntu-latest
    needs: [test, semgrep-sast, semgrep-sca]
    steps:
      - name: pass
        run: echo "dast passed"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, semgrep-sast, semgrep-sca]
    steps:
      - name: pass
        run: echo "build-and-push passed"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: pass
        run: echo "deploy passed"

  healthz:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: pass
        run: echo "healthz passed (general health check)"

  livez:
    runs-on: ubuntu-latest
    needs: healthz
    steps:
      - name: pass
        run: echo "livez passed (for liveness probe)"

  readyz:
    runs-on: ubuntu-latest
    needs: livez
    steps:
      - name: pass
        run: echo "readyz passed (for readiness probe)"

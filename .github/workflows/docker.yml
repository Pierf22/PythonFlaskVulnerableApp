name: Build Docker Image

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (from cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha

      - name: Smoke test
        run: |
          docker run -d --name app -p 5000:5000 \
            python-flask-vulnerable-app:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/ || (docker logs app && exit 1)
          docker stop app

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run SAST (SARIF)
        run: semgrep --config p/python --config p/flask --config p/owasp-top-ten --sarif --output semgrep.sarif || true

      - name: Run SAST (HTML report)
        run: semgrep --config p/python --config p/flask --config p/owasp-top-ten --html --output semgrep-sast-report.html || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-sast-report.html

  semgrep-sca:
    name: Semgrep SCA (Supply Chain)
    runs-on: ubuntu-latest
    needs: build
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run SCA
        run: semgrep ci --supply-chain || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  dast:
    runs-on: ubuntu-latest
    needs: [test, semgrep-sast, semgrep-sca]
    steps:
      - name: pass
        run: echo "dast passed"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, semgrep-sast, semgrep-sca]
    steps:
      - name: pass
        run: echo "build-and-push passed"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: pass
        run: echo "deploy passed"

  healthz:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: pass
        run: echo "healthz passed (general health check)"

  livez:
    runs-on: ubuntu-latest
    needs: healthz
    steps:
      - name: pass
        run: echo "livez passed (for liveness probe)"

  readyz:
    runs-on: ubuntu-latest
    needs: livez
    steps:
      - name: pass
        run: echo "readyz passed (for readiness probe)"

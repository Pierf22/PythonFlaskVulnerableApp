name: CI - Build, Scan & Deploy

on:
  push:
    branches: [dev, stage, main, security-test]
  pull_request:
    branches: [main, stage]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────── Build
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────── Test
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (from cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha

  # ───────────────────────────────────────────── SCA (all branches)
  sca:
    name: SCA - Dependency & Filesystem Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy FS SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 5

  # ───────────────────────────────────────────── SAST (all branches)
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (JSON)
        # Soft-fail: emit JSON report, don't block here.
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/python \
            --config=p/security-audit \
            --config=p/secrets \
            --json --output=semgrep.json \
            --metrics=off \
            --exclude=target \
            --exclude=.mvn

      - name: Upload Semgrep JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: semgrep.json
          retention-days: 5

  # ───────────────────────────────────────────── DAST (not dev, not PRs)
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [test, sast, sca]
    continue-on-error: true
    if: |
      github.event_name != 'pull_request'
      && github.ref != 'refs/heads/dev'
    container:
      image: ghcr.io/zaproxy/zaproxy:stable
      options: --user root -v ${{ github.workspace }}:/zap/wrk/:rw
    steps:
      - name: Run ZAP Baseline Scan (stage/main)
        if: github.ref != 'refs/heads/security-test'
        run: zap-baseline.py -t ${{ secrets.APP_URL }} -x zap-report.xml || echo 0

      - name: Run ZAP Active Scan (security-test)
        if: github.ref == 'refs/heads/security-test'
        run: zap-full-scan.py -t ${{ secrets.APP_URL }} -x zap-report.xml || echo 0

      - name: Upload ZAP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: /zap/wrk/zap-report.xml
          retention-days: 5

  # ───────────────────────────────────────────── Upload to Faraday (not dev, not PRs)
  upload-to-faraday:
    name: Upload to Faraday
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    if: |
      always()
      && github.event_name != 'pull_request'
      && github.ref != 'refs/heads/dev'
      && (needs.sast.result == 'success' || needs.sast.result == 'failure')
      && (needs.sca.result == 'success' || needs.sca.result == 'failure')
      && (needs.dast.result == 'success' || needs.dast.result == 'failure')
    container:
      image: python:3.9
      options: --user root
    steps:
      - name: Download SAST report artifact
        uses: actions/download-artifact@v4
        with:
          name: semgrep-json
          path: sast-report

      - name: Download SCA report artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-fs-sarif
          path: sca-report

      - name: Download DAST report artifact
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: dast-report

      - name: Upload Reports to Faraday
        env:
          FARADAY_HOST: ${{ secrets.FARADAY_HOST }}
          FARADAY_USERNAME: ${{ secrets.FARADAY_USERNAME }}
          FARADAY_PASSWORD: ${{ secrets.FARADAY_PASSWORD }}
          FARADAY_WORKSPACE: ${{ secrets.FARADAY_WORKSPACE }}
          DAST_TAG: ${{ github.ref == 'refs/heads/security-test' && 'DAST-ACTIVE' || 'DAST' }}
        run: |
          pip install faraday-cli
          faraday-cli auth -f "$FARADAY_HOST" -u "$FARADAY_USERNAME" -p "$FARADAY_PASSWORD"
          faraday-cli workspace create "$FARADAY_WORKSPACE" || true
          faraday-cli workspace select "$FARADAY_WORKSPACE"
          faraday-cli tool report sast-report/semgrep.json --vuln-tag SAST --host-tag SAST
          faraday-cli tool report sca-report/trivy-fs.sarif --vuln-tag SCA --host-tag SCA
          faraday-cli tool report dast-report/zap-report.xml --vuln-tag "$DAST_TAG" --host-tag "$DAST_TAG"

  # ───────────────────────────────────────────── Security Gate (stage/main only)
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: upload-to-faraday
    if: |
      always()
      && github.event_name != 'pull_request'
      && (github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main')
      && needs.upload-to-faraday.result == 'success'
    container:
      image: python:3.9
      options: --user root
    env:
      MAX_CRITICAL: 0
      MAX_HIGH: 5
    steps:
      - name: Check vulnerability thresholds
        env:
          FARADAY_HOST: ${{ secrets.FARADAY_HOST }}
          FARADAY_USERNAME: ${{ secrets.FARADAY_USERNAME }}
          FARADAY_PASSWORD: ${{ secrets.FARADAY_PASSWORD }}
          FARADAY_WORKSPACE: ${{ secrets.FARADAY_WORKSPACE }}
        run: |
          pip install faraday-cli -q
          faraday-cli auth -f "$FARADAY_HOST" -u "$FARADAY_USERNAME" -p "$FARADAY_PASSWORD"
          faraday-cli workspace select "$FARADAY_WORKSPACE"

          CRITICAL=$(faraday-cli vuln list -w "$FARADAY_WORKSPACE" --severity critical -j | \
            python3 -c "import sys,json; v=json.load(sys.stdin); print(len([x for x in v if x.get('value',{}).get('status')=='open']))")
          HIGH=$(faraday-cli vuln list -w "$FARADAY_WORKSPACE" --severity high -j | \
            python3 -c "import sys,json; v=json.load(sys.stdin); print(len([x for x in v if x.get('value',{}).get('status')=='open']))")

          echo "Critical: $CRITICAL (max: $MAX_CRITICAL)"
          echo "High:     $HIGH (max: $MAX_HIGH)"

          if [ "$CRITICAL" -gt "$MAX_CRITICAL" ]; then
            echo "Security gate FAILED: $CRITICAL critical vulnerabilities exceed threshold ($MAX_CRITICAL)"
            exit 1
          fi
          if [ "$HIGH" -gt "$MAX_HIGH" ]; then
            echo "Security gate FAILED: $HIGH high vulnerabilities exceed threshold ($MAX_HIGH)"
            exit 1
          fi
          echo "Security gate PASSED"

  # ───────────────────────────────────────────── Build & Push (stage/main only)
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, sast, sca, security-gate]
    if: |
      always()
      && github.event_name != 'pull_request'
      && (github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main')
      && needs.test.result == 'success'
      && needs.security-gate.result == 'success'
      && (needs.sca.result == 'success' || needs.sca.result == 'failure')
      && (needs.sast.result == 'success' || needs.sast.result == 'failure')
    steps:
      - name: pass
        run: echo "build-and-push passed"

  # ───────────────────────────────────────────── Deploy (stage/main only)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      always()
      && github.event_name != 'pull_request'
      && (github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main')
      && needs.build-and-push.result == 'success'
    steps:
      - name: pass
        run: echo "deploy passed"

  healthz:
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - name: pass
        run: echo "healthz passed"

  livez:
    runs-on: ubuntu-latest
    needs: healthz
    steps:
      - name: pass
        run: echo "livez passed"

  readyz:
    runs-on: ubuntu-latest
    needs: livez
    steps:
      - name: pass
        run: echo "readyz passed"

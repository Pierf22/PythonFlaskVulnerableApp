name: Build Docker Image

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (from cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: python-flask-vulnerable-app:${{ github.sha }}
          cache-from: type=gha

  # ───────────────────────────────────────────── SCA
  sca:
    name: SCA - Dependency & Filesystem Scan
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy FS SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 5

  # ───────────────────────────────────────────── SAST
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (JSON)
        # Soft-fail: emit JSON report, don't block here.
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/python \
            --config=p/security-audit \
            --config=p/secrets \
            --json --output=semgrep.json \
            --metrics=off \
            --exclude=target \
            --exclude=.mvn

      - name: Upload Semgrep JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: semgrep.json
          retention-days: 5

  # ───────────────────────────────────────────── DAST
  dast:
    name: DAST - OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: [test, sast, sca]
    continue-on-error: true
    container:
      image: ghcr.io/zaproxy/zaproxy:stable
      options: --user root -v ${{ github.workspace }}:/zap/wrk/:rw
    steps:
      - name: Run ZAP Baseline Scan
        run: zap-baseline.py -t ${{ secrets.APP_URL }} -x zap-report.xml || echo 0

      - name: Upload ZAP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: /zap/wrk/zap-report.xml
          retention-days: 5

  upload-to-faraday:
    name: Upload to Faraday
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    container:
      image: python:3.9
      options: --user root
    steps:
      - name: Download SAST report artifact
        uses: actions/download-artifact@v4
        with:
          name: semgrep-json
          path: sast-report

      - name: Download SCA report artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-fs-sarif
          path: sca-report

      - name: Download DAST report artifact
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: dast-report

      - name: Upload Reports to Faraday
        env:
          FARADAY_HOST: ${{ secrets.FARADAY_HOST }}
          FARADAY_USERNAME: ${{ secrets.FARADAY_USERNAME }}
          FARADAY_PASSWORD: ${{ secrets.FARADAY_PASSWORD }}
          FARADAY_WORKSPACE: ${{ secrets.FARADAY_WORKSPACE }}
        run: |
          pip install faraday-cli
          faraday-cli auth -f "$FARADAY_HOST" -u "$FARADAY_USERNAME" -p "$FARADAY_PASSWORD"
          faraday-cli workspace create "$FARADAY_WORKSPACE" || true
          faraday-cli workspace select "$FARADAY_WORKSPACE"
          faraday-cli tool report sast-report/semgrep.json
          faraday-cli tool report sca-report/trivy-fs.sarif
          faraday-cli tool report dast-report/zap-report.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, sast, sca]
    steps:
      - name: pass
        run: echo "build-and-push passed"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: pass
        run: echo "deploy passed"

  healthz:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: pass
        run: echo "healthz passed (general health check)"

  livez:
    runs-on: ubuntu-latest
    needs: healthz
    steps:
      - name: pass
        run: echo "livez passed (for liveness probe)"

  readyz:
    runs-on: ubuntu-latest
    needs: livez
    steps:
      - name: pass
        run: echo "readyz passed (for readiness probe)"
